name: Check Upstream Release

on:
  workflow_dispatch:
    inputs:
      push_to_aur:
        description: Push updated PKGBUILD and .SRCINFO to AUR after a successful build
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: check-upstream-release
  cancel-in-progress: false

jobs:
  update-and-build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    defaults:
      run:
        shell: bash

    steps:
      - name: Install workflow dependencies
        run: |
          pacman -Syu --noconfirm --needed git curl jq nodejs openssh pacman-contrib

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Prepare build user
        run: |
          id builder &>/dev/null || useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          install -d -m 0755 -o builder -g builder /home/builder/.cache /home/builder/.config

      - name: Detect latest upstream release
        id: detect
        run: |
          set -euo pipefail

          current_version="$(sed -n 's/^pkgver=//p' PKGBUILD | head -n1)"
          latest_tag="$(curl -fsSL https://api.github.com/repos/dyndynjyxa/aio-coding-hub/releases/latest | jq -r '.tag_name')"

          if [[ -z "$latest_tag" || "$latest_tag" == "null" ]]; then
            echo "Failed to retrieve the latest upstream tag" >&2
            exit 1
          fi

          latest_version="${latest_tag#aio-coding-hub-v}"
          if [[ "$latest_version" == "$latest_tag" ]]; then
            latest_version="${latest_tag#v}"
          fi

          if [[ ! "$latest_version" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
            echo "Unexpected upstream tag format: $latest_tag" >&2
            exit 1
          fi

          if [[ "$current_version" == "$latest_version" ]]; then
            has_update=false
          else
            has_update=true
          fi

          {
            echo "current_version=$current_version"
            echo "latest_tag=$latest_tag"
            echo "latest_version=$latest_version"
            echo "has_update=$has_update"
          } >> "$GITHUB_OUTPUT"

      - name: Decide whether to push to AUR
        id: push_mode
        run: |
          echo "push_to_aur=${{ github.event_name != 'workflow_dispatch' || inputs.push_to_aur }}" >> "$GITHUB_OUTPUT"

      - name: Add workflow summary
        run: |
          {
            echo "## Upstream Version Check"
            echo ""
            echo "- Current pkgver: \`${{ steps.detect.outputs.current_version }}\`"
            echo "- Latest upstream tag: \`${{ steps.detect.outputs.latest_tag }}\`"
            echo "- Parsed upstream version: \`${{ steps.detect.outputs.latest_version }}\`"
            echo "- Update available: \`${{ steps.detect.outputs.has_update }}\`"
            echo "- Push to AUR enabled: \`${{ steps.push_mode.outputs.push_to_aur }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Update PKGBUILD and .SRCINFO
        if: steps.detect.outputs.has_update == 'true'
        env:
          LATEST_VERSION: ${{ steps.detect.outputs.latest_version }}
        run: |
          set -euo pipefail

          runuser -u builder -- env HOME="/home/builder" GITHUB_WORKSPACE="$GITHUB_WORKSPACE" LATEST_VERSION="$LATEST_VERSION" bash -lc '
            set -euo pipefail
            cd "$GITHUB_WORKSPACE"

            sed -i -E "s/^pkgver=.*/pkgver=${LATEST_VERSION}/" PKGBUILD
            sed -i -E "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

            updpkgsums
            makepkg --printsrcinfo > .SRCINFO
          '

      - name: Build package
        if: steps.detect.outputs.has_update == 'true'
        run: |
          set -euo pipefail

          runuser -u builder -- env HOME="/home/builder" GITHUB_WORKSPACE="$GITHUB_WORKSPACE" bash -lc '
            set -euo pipefail
            cd "$GITHUB_WORKSPACE"
            makepkg -f --nodeps
          '

      - name: Configure SSH for AUR
        if: steps.detect.outputs.has_update == 'true' && steps.push_mode.outputs.push_to_aur == 'true'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY || secrets.AUR_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS || secrets.AUR_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          if [[ -z "${SSH_PRIVATE_KEY:-}" ]]; then
            echo "SSH_PRIVATE_KEY secret is required" >&2
            exit 1
          fi

          runuser -u builder -- env HOME="/home/builder" SSH_PRIVATE_KEY="$SSH_PRIVATE_KEY" SSH_KNOWN_HOSTS="${SSH_KNOWN_HOSTS:-}" bash -lc '
            set -euo pipefail

            install -d -m 700 "$HOME/.ssh"
            printf "%s\n" "$SSH_PRIVATE_KEY" > "$HOME/.ssh/aur"
            chmod 600 "$HOME/.ssh/aur"

            if [[ -n "${SSH_KNOWN_HOSTS:-}" ]]; then
              printf "%s\n" "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
            else
              ssh-keyscan aur.archlinux.org > "$HOME/.ssh/known_hosts"
            fi

            printf "%s\n" \
              "Host aur.archlinux.org" \
              "  User aur" \
              "  IdentityFile ~/.ssh/aur" \
              "  IdentitiesOnly yes" \
              "  StrictHostKeyChecking yes" \
              > "$HOME/.ssh/config"
            chmod 600 "$HOME/.ssh/config" "$HOME/.ssh/known_hosts"
          '

      - name: Push updated metadata to AUR
        if: steps.detect.outputs.has_update == 'true' && steps.push_mode.outputs.push_to_aur == 'true'
        env:
          AUR_REMOTE_URL: ssh://aur@aur.archlinux.org/aio-coding-hub-bin.git
          AUR_TARGET_BRANCH: master
          LATEST_VERSION: ${{ steps.detect.outputs.latest_version }}
        run: |
          set -euo pipefail

          runuser -u builder -- env HOME="/home/builder" GITHUB_WORKSPACE="$GITHUB_WORKSPACE" AUR_REMOTE_URL="$AUR_REMOTE_URL" AUR_TARGET_BRANCH="$AUR_TARGET_BRANCH" LATEST_VERSION="$LATEST_VERSION" bash -lc '
            set -euo pipefail

            workdir="$(mktemp -d)"
            trap '"'"'rm -rf "$workdir"'"'"' EXIT

            git clone "$AUR_REMOTE_URL" "$workdir/aur"

            cp "$GITHUB_WORKSPACE/PKGBUILD" "$workdir/aur/PKGBUILD"
            cp "$GITHUB_WORKSPACE/.SRCINFO" "$workdir/aur/.SRCINFO"

            cd "$workdir/aur"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            if git diff --quiet -- PKGBUILD .SRCINFO; then
              echo "No AUR metadata changes to push."
              exit 0
            fi

            git add PKGBUILD .SRCINFO
            git commit -m "Update to ${LATEST_VERSION}"
            GIT_SSH_COMMAND="ssh -F $HOME/.ssh/config" git push origin HEAD:${AUR_TARGET_BRANCH}
          '

      - name: Push updated metadata back to GitHub
        if: steps.detect.outputs.has_update == 'true' && steps.push_mode.outputs.push_to_aur == 'true'
        env:
          GITHUB_TARGET_BRANCH: ${{ github.ref_name }}
          LATEST_VERSION: ${{ steps.detect.outputs.latest_version }}
        run: |
          set -euo pipefail

          runuser -u builder -- env HOME="/home/builder" GITHUB_WORKSPACE="$GITHUB_WORKSPACE" GITHUB_TARGET_BRANCH="$GITHUB_TARGET_BRANCH" LATEST_VERSION="$LATEST_VERSION" bash -lc '
            set -euo pipefail

            git config --global --add safe.directory "$GITHUB_WORKSPACE"
            cd "$GITHUB_WORKSPACE"

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git add PKGBUILD .SRCINFO

            if git diff --cached --quiet; then
              echo "No GitHub metadata changes to push."
              exit 0
            fi

            git commit -m "Update to ${LATEST_VERSION}"
            git push origin HEAD:${GITHUB_TARGET_BRANCH}
          '
